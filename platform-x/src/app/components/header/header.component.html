<header class="header bg-white border-b shadow-sm">
  <div class="header-container flex items-center justify-between px-4 py-2">
    
    <!-- Left side -->
    <div class="header-left flex items-center gap-4">
      
      <!-- Authenticated User Navigation -->
      <div *ngIf="isAuthenticated" class="authenticated-nav flex items-center gap-4">
        <button 
          class="home-btn flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 cursor-pointer"
          (click)="onHomeClick()"
          title="Accueil / Workspace">
          <mat-icon>home</mat-icon>
          <span class="text-sm font-medium">Home</span>
        </button>
      </div>

      <!-- Public Navigation -->
      <div *ngIf="!isAuthenticated" class="public-nav flex items-center gap-6">
        <div class="logo cursor-pointer" (click)="onPublicPageClick('')">
          <h1 class="text-xl font-bold text-gray-900">Platform X</h1>
        </div>
        
        <nav class="public-links flex items-center gap-4">
          <a 
            class="nav-link text-sm text-gray-700 hover:text-gray-900 cursor-pointer"
            (click)="onPublicPageClick('community')">
            Community
          </a>
          <a 
            class="nav-link text-sm text-gray-700 hover:text-gray-900 cursor-pointer"
            (click)="onPublicPageClick('enterprise')">
            Entreprise
          </a>
          <a 
            class="nav-link text-sm text-gray-700 hover:text-gray-900 cursor-pointer"
            (click)="onPublicPageClick('learn')">
            Learn
          </a>
          <a 
            class="nav-link text-sm text-gray-700 hover:text-gray-900 cursor-pointer"
            (click)="onPublicPageClick('shipped')">
            Shipped
          </a>
        </nav>
      </div>
    </div>

    <!-- Right side -->
    <div class="header-right flex items-center gap-2">
      
      <!-- Authenticated User Tools -->
      <div *ngIf="isAuthenticated" class="authenticated-tools flex items-center gap-2">
        <button 
          class="tool-btn"
          (click)="onCodeClick()"
          title="Éditeur de code">
          <mat-icon>code</mat-icon>
        </button>
        
        <button 
          class="tool-btn"
          (click)="onGithubClick()"
          title="GitHub">
          <mat-icon>code</mat-icon>
          <span class="text-xs">GitHub</span>
        </button>
        
        <button 
          class="tool-btn"
          (click)="onDatabaseClick()"
          title="Base de données">
          <mat-icon>storage</mat-icon>
        </button>
        
        <button 
          class="tool-btn"
          (click)="onInviteClick()"
          title="Inviter">
          <mat-icon>mail</mat-icon>
        </button>
        
        <button 
          class="tool-btn upgrade-btn"
          (click)="onUpgradeClick()"
          title="Upgrade">
          <mat-icon>upgrade</mat-icon>
          <span class="text-xs">Upgrade</span>
        </button>
        
        <button 
          class="tool-btn publish-btn"
          (click)="onPublishClick()"
          title="Publier">
          <mat-icon>publish</mat-icon>
          <span class="text-xs">Publish</span>
        </button>

        <!-- User Menu -->
        <div class="user-menu relative">
          <button 
            class="user-avatar flex items-center justify-center w-8 h-8 rounded-full bg-blue-500 text-white text-sm font-medium cursor-pointer"
            (click)="toggleUserMenu()">
            {{ currentUser?.initials || 'U' }}
          </button>
          
          <!-- User Dropdown -->
          <div 
            *ngIf="showUserMenu" 
            class="dropdown absolute right-0 top-10 bg-white border rounded-lg shadow-lg p-2 z-50 min-w-48">
            <div class="user-info p-2 border-b">
              <div class="font-medium text-sm">{{ currentUser?.name }}</div>
              <div class="text-xs text-gray-600">{{ currentUser?.email }}</div>
              <div class="text-xs text-blue-600 mt-1">
                Plan: {{ currentUser?.subscription || 'free' }}
              </div>
            </div>
            
            <button 
              class="dropdown-item"
              (click)="onProfileClick()">
              <mat-icon>person</mat-icon>
              Profil
            </button>
            
            <button 
              class="dropdown-item"
              (click)="onSettingsClick()">
              <mat-icon>settings</mat-icon>
              Paramètres
            </button>
            
            <hr class="my-1">
            
            <button 
              class="dropdown-item text-red-600"
              (click)="onLogoutClick()">
              <mat-icon>logout</mat-icon>
              Déconnexion
            </button>
          </div>
        </div>
      </div>

      <!-- Public User Actions -->
      <div *ngIf="!isAuthenticated" class="public-actions">
        <div class="login-menu relative">
          <button 
            class="login-btn flex items-center gap-1 px-4 py-2 border rounded-lg hover:bg-gray-50"
            (click)="toggleLoginMenu()">
            Se connecter
            <mat-icon class="text-sm">expand_more</mat-icon>
          </button>
          
          <!-- Login Dropdown -->
          <div 
            *ngIf="showLoginMenu" 
            class="dropdown absolute right-0 top-10 bg-white border rounded-lg shadow-lg p-2 z-50 min-w-40">
            <button 
              class="dropdown-item"
              (click)="onLoginClick()">
              <mat-icon>login</mat-icon>
              Connexion
            </button>
            
            <button 
              class="dropdown-item"
              (click)="onSignupClick()">
              <mat-icon>person_add</mat-icon>
              Créer un compte
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
