version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: edu-chain-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: edu-chain-credentials
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - edu-chain-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edu-chain-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/edu-chain-credentials?authSource=admin
      JWT_SECRET: your-super-secure-jwt-secret-here
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://localhost:4200
      HEDERA_NETWORK: testnet
      HEDERA_ACCOUNT_ID: ${HEDERA_ACCOUNT_ID}
      HEDERA_PRIVATE_KEY: ${HEDERA_PRIVATE_KEY}
      IPFS_API_URL: https://ipfs.infura.io:5001
      IPFS_GATEWAY_URL: https://ipfs.io/ipfs/
      IPFS_PROJECT_ID: ${IPFS_PROJECT_ID}
      IPFS_PROJECT_SECRET: ${IPFS_PROJECT_SECRET}
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - edu-chain-network

  # Frontend Angular
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edu-chain-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      API_URL: http://localhost:3000/api
      NODE_ENV: development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - edu-chain-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: edu-chain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - edu-chain-network

  # Redis Cache (optionnel)
  redis:
    image: redis:7-alpine
    container_name: edu-chain-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edu-chain-network

  # IPFS Node (optionnel pour développement local)
  ipfs:
    image: ipfs/go-ipfs:latest
    container_name: edu-chain-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    environment:
      IPFS_PROFILE: server
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - edu-chain-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  ipfs_data:
    driver: local

networks:
  edu-chain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16